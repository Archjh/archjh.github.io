<!DOCTYPE html>
<html>
<head>
    <title>KOOK 语音播放器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background: #f0f0f0;
        }
        .player {
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        audio {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="player">
        <h2>语音消息</h2>
        <audio controls>
            <source src="1.mp3" type="audio/mp3">
            您的浏览器不支持 HTML5 音频播放器。
        </audio>
        <p>拖动进度条控制播放</p>
    </div>
</body>
</html>
